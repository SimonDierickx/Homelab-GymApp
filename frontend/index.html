<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;height:100%;overscroll-behavior:none;}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;min-height:100dvh;}
#scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
input,textarea,select,button{font-family:inherit;-webkit-appearance:none;appearance:none;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
::-webkit-scrollbar{display:none;}
.anim{animation:su 0.15s ease;}
@keyframes su{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.sheet{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;display:flex;align-items:flex-end;}
.sheet-inner{width:100%;max-width:430px;margin:0 auto;background:#1C1C1E;border-radius:22px 22px 0 0;padding:20px 20px max(env(safe-area-inset-bottom),24px);max-height:90dvh;overflow-y:auto;}
</style>
</head>

function ic(name,sz=20,col='currentColor'){
  const svg=(IC[name]||IC.x).replace('<svg ','<svg width="'+sz+'" height="'+sz+'" ');
  return`<span style="display:inline-flex;align-items:center;justify-content:center;width:${sz}px;height:${sz}px;color:${col};flex-shrink:0">${svg}</span>`;
}

// ── Custom dialogs (iOS PWA safe) ───────────────────────────────────────────
function dlg(html){const r=document.getElementById('dlg-root');r.innerHTML=html;}
function closeDlg(){dlg('');}
function showConfirm(msg,onYes,yesLabel='Confirm',danger=true){
  dlg(`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:flex-end">
    <div style="width:100%;max-width:430px;margin:0 auto;background:${C1};border-radius:22px 22px 0 0;padding:24px 20px max(env(safe-area-inset-bottom),24px)">
      <div style="font-size:16px;line-height:1.5;margin-bottom:22px">${msg}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <button onclick="closeDlg()" style="padding:14px;border-radius:14px;border:0.5px solid ${DIV};background:transparent;color:rgba(255,255,255,0.7);font-size:16px;cursor:pointer">Cancel</button>
        <button id="dlg-yes" style="padding:14px;border-radius:14px;border:none;background:${danger?'#FF3B30':T};color:${danger?'white':'#000'};font-size:16px;font-weight:600;cursor:pointer">${yesLabel}</button>
      </div>
    </div>
  </div>`);
  document.getElementById('dlg-yes').onclick=()=>{closeDlg();onYes&&onYes();};
}
function showAlert(msg){
  dlg(`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:flex;align-items:flex-end">
    <div style="width:100%;max-width:430px;margin:0 auto;background:${C1};border-radius:22px 22px 0 0;padding:24px 20px max(env(safe-area-inset-bottom),24px)">

    </div>
  </div>`);
}

function setPwd(u,p){const ov=JSON.parse(localStorage.getItem('gym_creds_ov')||'{}');ov[u]=p;localStorage.setItem('gym_creds_ov',JSON.stringify(ov));}

// ── Persistence ──────────────────────────────────────────────────────────────
const pk=k=>'gym_'+k+'_'+S.user;
function persist(){
  try{
    localStorage.setItem(pk('h'),JSON.stringify(S.history.map(h=>({...h,date:h.date.toISOString()}))));
    localStorage.setItem(pk('p'),JSON.stringify(S.prevSet));
    localStorage.setItem(pk('c'),JSON.stringify(S.customSessions));
  }catch{}
}
function load(){
  try{
    const h=localStorage.getItem(pk('h'));if(h)S.history=JSON.parse(h).map(x=>({...x,date:new Date(x.date)}));
    const p=localStorage.getItem(pk('p'));if(p)S.prevSet=JSON.parse(p);
    const c=localStorage.getItem(pk('c'));if(c)S.customSessions=JSON.parse(c);
  }catch{}
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiPost(path,body){
  if(!API_KEY)return;
  try{await fetch(GYM_API+path,{method:'POST',headers:{'Content-Type':'application/json','X-API-Key':API_KEY},body:JSON.stringify(body)});}

}

// ── Timer ─────────────────────────────────────────────────────────────────────
function timerStart(){
  if(S.timer.running)return;
  if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
  S.timer.running=true;
  S.timer.iv=setInterval(()=>{
    S.timer.remain=Math.max(0,S.timer.remain-1);
    if(S.timer.remain===0){
      S.timer.running=false;clearInterval(S.timer.iv);S.timer.iv=null;
      if('Notification' in window&&Notification.permission==='granted')
        new Notification('Rest done! 💪',{body:'Next set — go!',icon:'icon-192.png'});
      if(navigator.vibrate)navigator.vibrate([400,100,400]);
    }
    if(S.screen==='timer')rCircle();else rStrip();
  },1000);
}
function timerPause(){S.timer.running=false;clearInterval(S.timer.iv);S.timer.iv=null;if(S.screen==='timer')rCircle();else rStrip();}
function timerSet(s){if(S.timer.iv)clearInterval(S.timer.iv);S.timer.iv=null;S.timer.running=false;S.timer.total=s;S.timer.remain=s;if(S.screen==='timer')rCircle();else rStrip();}
function timerAdj(d){S.timer.remain=Math.max(0,S.timer.remain+d);if(S.timer.remain>S.timer.total)S.timer.total=S.timer.remain;rCircle();}
function openTimer(){S.timerStrip=true;S.screen='timer';render();}
function closeTimer(){S.screen='workout';render();}
function hideStrip(){S.timerStrip=false;if(S.timer.running)timerPause();render();}
function rCircle(){
  const el=document.getElementById('tc');if(!el)return;
  const pct=S.timer.total>0?S.timer.remain/S.timer.total:0;
  const off=CIRC*(1-pct);
  const col=S.timer.remain<=10?'#FF3B30':S.timer.remain<=30?'#FF9F0A':T;
  el.innerHTML=`<svg width="260" height="260" viewBox="0 0 260 260">
    <circle cx="130" cy="130" r="110" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10"/>
    <circle cx="130" cy="130" r="110" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round"
      stroke-dasharray="${CIRC.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 130 130)"
      style="transition:stroke-dashoffset 0.9s linear,stroke 0.3s"/>
    <text x="130" y="130" text-anchor="middle" dominant-baseline="middle" fill="white"
      font-size="54" font-weight="200" font-family="-apple-system,sans-serif" letter-spacing="-2">${fmtT(S.timer.remain)}</text>
  </svg>`;
  const pb=document.getElementById('tc-play');if(pb)pb.innerHTML=ic(S.timer.running?'pause':'play',26,'#000');
  [30,45,60,90,120,180].forEach(s=>{const b=document.getElementById('tp-'+s);
    if(b){b.style.background=S.timer.total===s?col:C2;b.style.color=S.timer.total===s?'#000':T;}});
}
function rStrip(){
  const col=S.timer.remain<=10?'#FF3B30':S.timer.remain<=30?'#FF9F0A':T;
  const t=document.getElementById('ts-t');const p=document.getElementById('ts-p');
  if(t){t.style.color=col;t.textContent=fmtT(S.timer.remain);}
  if(p)p.innerHTML=ic(S.timer.running?'pause':'play',20,'#000');
}

// ── Workout ───────────────────────────────────────────────────────────────────
function initWk(key){
  const sess=allS()[key];if(!sess)return;
  const setData={};
  sess.exercises.forEach(ex=>{
    setData[ex.id]=Array.from({length:ex.sets},()=>({weight:null,reps:null,note:'',done:false}));
  });
  S.wk={key,sessionName:sess.name,exercises:[...sess.exercises],setData,startTime:Date.now(),sessionNote:''};
  S.timer.total=90;S.timer.remain=90;S.timer.running=false;S.timerStrip=false;S.wkMinimized=false;
  if(S.timer.iv){clearInterval(S.timer.iv);S.timer.iv=null;}
}
function minimizeWk(){S.wkMinimized=true;S.screen='main';S.tab='log';render();}
function resumeWk(){S.wkMinimized=false;S.screen='workout';render();}
function endWkConfirm(){
  showConfirm('End workout without saving?',()=>{
    if(S.timer.iv)clearInterval(S.timer.iv);S.timer.iv=null;
    S.timer.running=false;S.timerStrip=false;S.wk=null;S.wkMinimized=false;
    S.screen='main';S.tab='routines';render();
  });
}

async function finishWk(){
  if(!S.wk)return;
  const dur=Math.round((Date.now()-S.wk.startTime)/60000)||1;
  const now=new Date();
  const ps={};
  S.wk.exercises.forEach(ex=>{
    const f=(S.wk.setData[ex.id]||[]).filter(s=>s.done||(s.weight!=null)||(s.reps!=null));
    if(f.length)ps[ex.id]=f.map(s=>({weight:s.weight,reps:s.reps,note:s.note||''}));
  });
  if(Object.keys(ps).length)S.prevSet[S.wk.key]={...(S.prevSet[S.wk.key]||{}),...ps};
  const entry={
    id:Date.now(),date:now,sessionKey:S.wk.key,
    sessionName:allS()[S.wk.key]?.name||'Workout',
    duration:dur,sessionNote:S.wk.sessionNote||'',
    setData:JSON.parse(JSON.stringify(S.wk.setData)),
    exercises:S.wk.exercises.map(e=>({id:e.id,name:e.name,target:e.sets+'×'+e.rep,w:e.w}))
  };
  S.history.unshift(entry);persist();
  const p={...entry,date:entry.date.toISOString(),user:S.user};
  apiPost('/save',p);apiPost('/commit',p);
  if(S.timer.iv)clearInterval(S.timer.iv);S.timer.iv=null;
  S.timer.running=false;S.timerStrip=false;S.wk=null;S.wkMinimized=false;
  S.screen='main';S.tab='log';render();
}

function removeHistory(idx){S.history.splice(idx,1);persist();render();}
function toggleDone(exId,si){
  if(!S.wk?.setData[exId])return;
  S.wk.setData[exId][si].done=!S.wk.setData[exId][si].done;

    btn.style.color=d?'#000':'rgba(255,255,255,0.55)';}
}
const uw=(exId,si,v)=>{if(S.wk?.setData[exId])S.wk.setData[exId][si].weight=v===''?null:parseFloat(v)||null;};
const ur=(exId,si,v)=>{if(S.wk?.setData[exId])S.wk.setData[exId][si].reps=v===''?null:parseInt(v)||null;};
const un=(exId,si,v)=>{if(S.wk?.setData[exId])S.wk.setData[exId][si].note=v;};
function addSet(exId){
  if(!S.wk)return;const ex=S.wk.exercises.find(e=>e.id===exId);if(!ex)return;
  const prev=S.wk.setData[exId]?.slice(-1)[0]||{weight:null,reps:null};
  S.wk.setData[exId].push({weight:null,reps:null,note:'',done:false});
  rerEx(exId);
}
function removeSet(exId,si){if(S.wk?.setData[exId]){S.wk.setData[exId].splice(si,1);S.menuSet=null;rerEx(exId);}}
function dupSet(exId,si){if(S.wk?.setData[exId]){const s={...S.wk.setData[exId][si],done:false};S.wk.setData[exId].splice(si+1,0,s);S.menuSet=null;rerEx(exId);}}
function removeExercise(exId){
  if(!S.wk)return;
  showConfirm('Remove this exercise?',()=>{S.wk.exercises=S.wk.exercises.filter(e=>e.id!==exId);delete S.wk.setData[exId];S.menuEx=null;render();});
}
function toggleMEx(exId){S.menuEx=S.menuEx===exId?null:exId;S.menuSet=null;rerEx(exId);}
function toggleMSet(exId,si){const same=S.menuSet?.exId===exId&&S.menuSet?.si===si;S.menuSet=same?null:{exId,si};S.menuEx=null;rerEx(exId);}
function showExHistory(exId,exName){
  const hist=[];
  S.history.forEach(h=>{
    const ex=(h.exercises||[]).find(e=>e.id===exId||e.name===exName);
    if(ex){const sets=(h.setData[ex.id]||[]).filter(s=>s.weight||s.reps);
      if(sets.length)hist.push({date:h.date,sets});}
  });
  openSheet('exHist',{exName,hist:hist.slice(0,6)});
}

function deleteSession(k){
  if(BASE[k]){showAlert("Can't delete built-in sessions.");return;}
  showConfirm('Delete session '+k+'?',()=>{delete S.customSessions[k];persist();render();});
}
function removeDetailEx(sk,exId){
  showConfirm('Remove this exercise?',()=>{
    if(!S.customSessions[sk])S.customSessions[sk]={...allS()[sk],exercises:[...allS()[sk].exercises]};
    S.customSessions[sk].exercises=S.customSessions[sk].exercises.filter(e=>e.id!==exId);

function makeMutable(k){
  if(!S.customSessions[k]){
    const s=allS()[k];
    S.customSessions[k]={...s,exercises:JSON.parse(JSON.stringify(s.exercises))};
  }
  return S.customSessions[k];
}

function saveSession(){
  const d=S.sheetData;if(!d.name?.trim()){showAlert('Enter a session name.');return;}

  S.customSessions[k]={name:d.name.trim(),notes:'',exercises:[]};persist();closeSheet();
  S.activeKey=k;S.screen='detail';render();
}
function saveSessionMeta(){
  const d=S.sheetData;if(!d.name?.trim())return;
  const s=makeMutable(d.key);s.name=d.name.trim();s.notes=d.notes||'';persist();closeSheet();render();
}
function saveAddEx(){
  const d=S.sheetData;if(!d.name?.trim()){showAlert('Enter an exercise name.');return;}
  const s=makeMutable(d.sessionKey);
  s.exercises.push({id:genId(),name:d.name.trim(),sets:+d.sets||3,rep:d.rep||'8',rest:d.rest||'1 min',note:d.note||'',w:!!d.w});
  persist();closeSheet();render();
}
function saveEditEx(){
  const d=S.sheetData;if(!d.name?.trim())return;
  const s=makeMutable(d.sessKey);
  const idx=s.exercises.findIndex(e=>e.id===d.exId);
  if(idx>=0)s.exercises[idx]={id:d.exId,name:d.name.trim(),sets:+d.sets||3,rep:d.rep||'8',rest:d.rest||'1 min',note:d.note||'',w:!!d.w};
  persist();closeSheet();render();
}
function saveAddExWkt(){
  const d=S.sheetData;if(!d.name?.trim()||!S.wk){showAlert('Enter a name.');return;}
  const id=genId();const ex={id,name:d.name.trim(),sets:+d.sets||3,rep:d.rep||'8',rest:d.rest||'1 min',note:d.note||'',w:!!d.w};
  S.wk.exercises.push(ex);
  S.wk.setData[id]=Array.from({length:ex.sets},()=>({weight:null,reps:null,note:'',done:false}));
  closeSheet();render();
}
function saveWktNote(){S.wk.sessionNote=S.sheetData.note||'';closeSheet();}
function doChangePwd(){
  const d=S.sheetData;
  if(!checkPwd(S.user,d.cur||'')){S.sheetData.err='Wrong current password';renderSheet();return;}
  if(!d.nw||d.nw.length<4){S.sheetData.err='New password must be at least 4 characters';renderSheet();return;}
  if(d.nw!==d.cf){S.sheetData.err='Passwords do not match';renderSheet();return;}
  setPwd(S.user,d.nw);closeSheet();showAlert('Password changed successfully!');
}
function doChangeUser(){
  const d=S.sheetData;if(!d.alias?.trim())return;
  setAlias(S.user,d.alias.trim());closeSheet();render();

  document.querySelectorAll('[data-r="'+exId+'"]').forEach(i=>{const si=+i.dataset.si;i.oninput=()=>ur(exId,si,i.value);});

function renderBottomUI(){
  const el=document.getElementById('bottom-ui');if(!el)return;

  let strips='';
  // Resume workout strip (when minimized)
  if(S.wk&&S.wkMinimized){
    strips+=`<div style="padding:8px 16px 0">
      <div onclick="resumeWk()" style="background:${C1};border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;border:0.5px solid rgba(77,217,212,0.25);box-shadow:0 4px 20px rgba(0,0,0,0.4)">
        <div style="width:38px;height:38px;border-radius:50%;background:${T};display:flex;align-items:center;justify-content:center;flex-shrink:0">${ic('play',16,'#000')}</div>

          <div style="font-size:12px;color:${T2}">Workout in progress</div>
          <div style="font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${S.wk.sessionName}</div>
        </div>
        <button onclick="event.stopPropagation();endWkConfirm()" style="background:rgba(255,59,48,0.15);border:0.5px solid rgba(255,59,48,0.3);border-radius:10px;color:#FF3B30;font-size:13px;font-weight:600;padding:7px 12px;cursor:pointer">End</button>
      </div>
    </div>`;
  }
  // Timer strip (when workout active and timer shown)
  if(S.wk&&!S.wkMinimized&&S.screen==='workout'&&S.timerStrip){
    const col=S.timer.remain<=10?'#FF3B30':S.timer.remain<=30?'#FF9F0A':T;
    strips+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:rgba(0,0,0,0.95);border-top:0.5px solid ${DIV}">
      <button id="ts-p" onclick="${S.timer.running?'timerPause()':'timerStart()'}"
        style="width:46px;height:46px;border-radius:50%;background:${T};border:none;cursor:pointer;display:flex;align-items:center;justify-content:center">${ic(S.timer.running?'pause':'play',20,'#000')}</button>

    </div>`;

    strips+=`<div style="background:${C1};border-top:0.5px solid ${DIV};display:flex;padding:4px 0 ${BOT}">
      ${tabs.map(tab=>`<button onclick="S.tab='${tab.id}';S.editMode=false;render()" style="flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0">
        <div style="width:56px;height:36px;border-radius:18px;background:${S.tab===tab.id?C2:'transparent'};display:flex;align-items:center;justify-content:center">
          ${ic(tab.icon,23,S.tab===tab.id?T:'rgba(255,255,255,0.4)')}

        <span style="font-size:10px;font-weight:500;color:${S.tab===tab.id?T:'rgba(255,255,255,0.4)'}">${tab.label}</span>
      </button>`).join('')}

// ── Main render ───────────────────────────────────────────────────────────────
function render(){
  if(S.screen==='timer'){
    document.getElementById('scroll').innerHTML=screenTimer();
    document.getElementById('scroll').style.paddingBottom='0';
    renderBottomUI();rCircle();return;
  }
  document.getElementById('scroll').className='anim';
  document.getElementById('scroll').innerHTML=renderScreen();
  // Padding for bottom UI
  let pb=0;
  if(S.wk&&S.wkMinimized)pb+=80; // resume strip
  if(S.screen==='workout'&&S.timerStrip)pb+=76; // timer strip
  if(S.screen==='main'||(S.wk&&S.wkMinimized))pb+=66; // tab bar
  document.getElementById('scroll').style.paddingBottom=pb+'px';
  renderBottomUI();wireAll();
}
function renderScreen(){
  if(S.screen==='login')return screenLogin();
  if(S.screen==='main'){
    if(S.tab==='log')return screenLog();
    if(S.tab==='routines')return screenRoutines();
    if(S.tab==='stats')return screenStats();
    if(S.tab==='profile')return screenProfile();
  }
  if(S.screen==='detail')return screenDetail();
  if(S.screen==='workout')return screenWorkout();
  if(S.screen==='log-detail')return screenLogDetail();
  return '';
}

            ${e.w?`<span style="font-size:15px">${s.weight!=null?s.weight+'kg':'—'}</span>`:''}
            <span style="font-size:15px">${s.reps??'—'}</span>
            <span style="font-size:13px;color:${T2}">${s.note||''}</span>
          </div>`).join('')}
        </div>`;
      }).join('')}
    </div>
  </div>`;}

function saveDetailName(key,val){if(!val.trim())return;makeMutable(key).name=val.trim();persist();}
function saveDetailNotes(key,val){makeMutable(key).notes=val;persist();}

            <div style="flex:1;min-width:0;cursor:pointer" onclick="openSheet('editExDetail',{sessKey:'${S.activeKey}',exId:'${ex.id}',name:'${(ex.name||'').replace(/'/g,"\\'")}',sets:${ex.sets},rep:'${ex.rep}',rest:'${ex.rest}',note:'${(ex.note||'').replace(/'/g,"\\'")}',w:${ex.w}})">

  if(!S.wk)return '';

  const totalDone=Object.values(S.wk.setData).flat().filter(s=>s.done).length;
  const total=Object.values(S.wk.setData).flat().length;
  const [mEx,mSet]=[S.menuEx,S.menuSet];

    <div style="padding:${TOP} 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid ${DIV};background:#000;position:sticky;top:0;z-index:10">

      <span style="flex:1;text-align:center;font-size:15px;font-weight:600">${ds}</span>

      ${S.wk.exercises.map(ex=>buildEx(ex)).join('')}

        style="width:100%;padding:12px;border-radius:12px;border:0.5px dashed rgba(255,255,255,0.2);background:transparent;color:${T2};font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:8px">
        ${ic('plus',16,T2)} Add exercise
      </button>

function screenTimer(){

        <button id="tc-play" onclick="${S.timer.running?'timerPause()':'timerStart()'}"
          style="width:76px;height:76px;border-radius:50%;background:${T};border:none;cursor:pointer;display:flex;align-items:center;justify-content:center">${ic(S.timer.running?'pause':'play',26,'#000')}</button>
        <button onclick="timerAdj(15)" style="width:64px;height:64px;border-radius:50%;background:${C2};border:none;color:${T};font-size:15px;font-weight:700;cursor:pointer">+15s</button>

          style="height:52px;min-width:64px;border-radius:26px;background:${S.timer.total===s?T:C2};color:${S.timer.total===s?'#000':T};border:none;cursor:pointer;font-size:14px;font-weight:700;padding:0 16px;flex-shrink:0">
          ${s<60?'00:'+String(s).padStart(2,'0'):'0'+Math.floor(s/60)+':'+(s%60?String(s%60).padStart(2,'0'):'00')}

function weekBounds(){
  const n=new Date(),d=n.getDay(),m=new Date(n);
  m.setDate(n.getDate()-(d===0?6:d-1));m.setHours(0,0,0,0);
  const s=new Date(m);s.setDate(m.getDate()+6);s.setHours(23,59,59,999);
  return{mon:m,sun:s};
}
function screenStats(){
  const total=S.history.length;
  const{mon,sun}=weekBounds();
  const wk=S.history.filter(h=>h.date>=mon&&h.date<=sun);
  const mo=S.history.filter(h=>{const n=new Date();return h.date.getMonth()===n.getMonth()&&h.date.getFullYear()===n.getFullYear();});
  const sc={};S.history.forEach(h=>{sc[h.sessionKey]=(sc[h.sessionKey]||0)+1;});
  const top=Object.entries(sc).sort((a,b)=>b[1]-a[1])[0];
  const prs={};
  S.history.forEach(h=>{(h.exercises||[]).forEach(ex=>{(h.setData[ex.id]||[]).forEach(s=>{
    if(s.weight&&s.reps){const sc=s.weight*s.reps;if(!prs[ex.name]||sc>prs[ex.name].score)prs[ex.name]={weight:s.weight,reps:s.reps,score:sc};}
  });});});
  const prList=Object.entries(prs).sort((a,b)=>b[1].score-a[1].score).slice(0,10);
  return`<div style="padding:${TOP} 16px 20px">
    <div style="font-size:34px;font-weight:800;margin-bottom:22px">Statistics</div>
    <div style="font-size:12px;font-weight:600;color:${T2};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">This week · ${mon.toLocaleDateString('nl-BE',{day:'numeric',month:'short'})} – ${sun.toLocaleDateString('nl-BE',{day:'numeric',month:'short'})}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">
      ${[{l:'Workouts',v:wk.length},{l:'Sets',v:wk.reduce((a,h)=>a+Object.values(h.setData||{}).flat().length,0)},{l:'Minutes',v:wk.reduce((a,h)=>a+h.duration,0)}].map(s=>`
        <div style="background:${C1};border-radius:14px;padding:14px 10px;text-align:center">
          <div style="font-size:26px;font-weight:700;color:${T}">${s.v}</div>
          <div style="font-size:11px;color:${T2};margin-top:3px">${s.l}</div>
        </div>`).join('')}
    </div>
    <div style="font-size:12px;font-weight:600;color:${T2};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">All time</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px">
      ${[{l:'Total',v:total},{l:'This month',v:mo.length},{l:'Total sets',v:S.history.reduce((a,h)=>a+Object.values(h.setData||{}).flat().length,0)}].map(s=>`
        <div style="background:${C1};border-radius:14px;padding:14px 10px;text-align:center">
          <div style="font-size:26px;font-weight:700">${s.v}</div>
          <div style="font-size:11px;color:${T2};margin-top:3px">${s.l}</div>
        </div>`).join('')}
    </div>
    ${top?`<div style="background:${C1};border-radius:14px;padding:14px 16px;margin-bottom:20px">
      <div style="font-size:12px;color:${T2};margin-bottom:4px">Most trained</div>
      <div style="font-size:16px;font-weight:600">Session ${top[0]}: ${allS()[top[0]]?.name||'—'}</div>
      <div style="font-size:13px;color:${T2};margin-top:2px">${top[1]} workout${top[1]!==1?'s':''}</div>
    </div>`:''}
    ${prList.length?`<div style="font-size:12px;font-weight:600;color:${T2};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px">Personal Records</div>
    <div style="background:${C1};border-radius:16px;overflow:hidden">
      ${prList.map(([name,pr],i)=>`
        <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:${i<prList.length-1?'0.5px solid '+DIV:'none'}">
          <span style="font-size:15px">${name}</span>
          <span style="font-size:14px;color:${T};font-weight:600">${pr.weight}kg × ${pr.reps}</span>
        </div>`).join('')}
    </div>`:`<div style="text-align:center;color:${T2};padding:40px 0">Log weighted exercises to see PRs</div>`}
  </div>`;}

      style="width:100%;padding:15px;border-radius:14px;background:rgba(255,59,48,0.12);border:0.5px solid rgba(255,59,48,0.3);color:#FF3B30;font-size:16px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
      ${ic('logout',18,'#FF3B30')} Sign out
    </button>
  </div>`;}

if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
render();
